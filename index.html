<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDA Match — Legal</title>
  <style>
    :root { --accent: #6C7FD8; --ink: #1A1A2E; --ink-muted: #5A5A7A; --bg: #F7F8FC; --surface: #fff; --border: #E2E4EF; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 26px; font-weight: 700; background: linear-gradient(150deg, #6C7FD8, #D85C7F); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    header p { font-size: 14px; color: var(--ink-muted); margin-top: 6px; }
    .links { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
    a.card { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; text-decoration: none; color: var(--ink); font-weight: 600; font-size: 16px; }
    a.card span { display: block; font-size: 13px; font-weight: 400; color: var(--ink-muted); margin-top: 2px; }
  </style>
</head>
<body>
  <header>
    <h1>SDA Match</h1>
    <p>Legal Documents</p>
  </header>
  <div class="links">
    <a class="card" href="privacy">Privacy Policy <span>How we collect and use your data</span></a>
    <a class="card" href="terms">Terms of Service <span>Rules for using SDA Match</span></a>
  </div>
</body>
</html>
